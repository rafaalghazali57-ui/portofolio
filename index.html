<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portofolio Menggambar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }
    header {
      text-align: center;
      padding: 40px;
      background: linear-gradient(90deg, #1e293b, #0f172a);
    }
    header h1 {
      margin: 0;
      font-size: 36px;
    }
    header p {
      color: #94a3b8;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background: #1e293b;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      color: #38bdf8;
    }
    .container {
      padding: 40px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #1e293b;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<header>
  <h1>Portofolio Gambar Saya</h1>
  <p>Kumpulan karya terbaik saya 🎨</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

<div class="container" id="home">
  <h2>Tentang Saya</h2>
  <p>Halo! Saya adalah seorang pelajar yang suka menggambar karakter, ilustrasi, dan desain kreatif.</p>
</div>

<div class="container" id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/300" alt="Gambar 1">
    <img src="https://via.placeholder.com/300" alt="Gambar 2">
    <img src="https://via.placeholder.com/300" alt="Gambar 3">
    <img src="https://via.placeholder.com/300" alt="Gambar 4">
  </div>
</div>

<div class="container" id="contact">
  <h2>Kontak</h2>
  <p>Email: rafaalgazali57@gmail.com</p>
  <p>Instagram: @username_kamu</p>
</div>

<footer>
  <p>© 2026 Portofolio Saya</p>
</footer>

</body>
</html>
