<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portofolio Menggambar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }
    header {
      text-align: center;
      padding: 40px;
      background: linear-gradient(90deg, #1e293b, #0f172a);
    }
    header h1 {
      margin: 0;
      font-size: 36px;
    }
    header p {
      color: #94a3b8;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background: #1e293b;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      color: #38bdf8;
    }
    .container {
      padding: 40px;
    }

    /* FILTER BUTTON */
    .filter {
      text-align: center;
      margin-bottom: 20px;
    }
    .filter button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #334155;
      color: white;
    }
    .filter button:hover {
      background: #38bdf8;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1e293b;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<header>
  <h1>Portofolio Gambar Saya</h1>
  <p>Kumpulan karya terbaik saya 🎨</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

<div class="container" id="home">
  <h2>Tentang Saya</h2>
  <p>Halo! Saya adalah seorang seniman yang suka menggambar karakter, ilustrasi, dan desain kreatif.</p>
</div>

<div class="container" id="gallery">
  <h2>Gallery</h2>

  <!-- FILTER MENU -->
  <div class="filter">
    <button onclick="filterSelection('all')">Semua</button>
    <button onclick="filterSelection('fanart')">Fanart</button>
    <button onclick="filterSelection('pemandangan')">Pemandangan</button>
    <button onclick="filterSelection('perspektif')">Perspektif</button>
    <button onclick="filterSelection('poster')">Poster</button>
  </div>

  <div class="gallery">
    <img src="Fanny_Aspirant.png" class="fanart">
    <img src="Ruby_Aspirant.png" class="fanart">
    <img src="aspirant_unite .png" class="fanart">
    <img src="Beatrix.png" class="fanart">
    <img src="poster_kartini.png" class="poster">
    <img src="lampumerah.png" class="pemandangan">
    <img src="depan_smk.png" class="pemandangan">
    <img src="smk2.png" class="pemandangan">
    <img src="street.png" class="pemandangan">
    <img src="https://via.placeholder.com/300" class="perspektif">
    <img src="https://via.placeholder.com/300" class="fanart">
  </div>
</div>

<div class="container" id="contact">
  <h2>Kontak</h2>
  <p>Email: emailkamu@example.com</p>
  <p>Instagram: @username_kamu</p>
</div>

<footer>
  <p>© 2026 Portofolio Saya</p>
</footer>

<script>
function filterSelection(category) {
  const images = document.querySelectorAll('.gallery img');
  images.forEach(img => {
    if (category === 'all') {
      img.style.display = 'block';
    } else {
      if (img.classList.contains(category)) {
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }
    }
  });
}
</script>

</body>
</html>
